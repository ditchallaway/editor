<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Editor — BrokerTricks</title>
  <meta name="description" content="Photopea-based property image editor for BrokerTricks order fulfillment">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/editor.css">
</head>
<body>

  <!-- Ambient Background Glows -->
  <div class="ambient-glow ambient-glow--primary"></div>
  <div class="ambient-glow ambient-glow--secondary"></div>

  <!-- Header -->
  <header class="header">
    <div class="header__left">
      <h1 class="header__title">Property Editor</h1>
      <p class="header__meta" id="header-meta">Loading property data…</p>
    </div>

    <div class="header__status">
      <span class="status-dot status-dot--loading" id="status-dot"></span>
      <span class="status-text" id="status-text">Initializing…</span>
    </div>

    <div class="header__actions">
      <button id="save-btn" class="btn btn--primary" disabled>
        <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Save Current to R2
      </button>

      <button id="fulfill-btn" class="btn btn--success" disabled>
        <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Approve &amp; Fulfill
      </button>

      <button id="sidebar-toggle" class="btn btn--ghost" title="Toggle property data panel">
        <svg class="btn__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="15" y1="3" x2="15" y2="21"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Layout -->
  <main class="editor-layout" id="editor-layout">

    <!-- Photopea Editor Pane -->
    <div class="editor-pane">
      <div class="editor-frame">
        <iframe id="photopea-frame" allow="clipboard-read; clipboard-write" src=""></iframe>
      </div>

      <!-- Loading Overlay (positioned over the editor pane) -->
      <div class="loading-overlay" id="loading-overlay">
        <div class="loader-ring"></div>
        <div class="loading-text" id="loading-text">Starting Photopea…</div>
        <div class="loading-subtext" id="loading-subtext">This usually takes a few seconds</div>
      </div>
    </div>

    <!-- Sidebar: Property Data & Progress -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__inner">

        <div class="sidebar__section">
          <h3 class="sidebar__heading">Order</h3>
          <div class="sidebar__grid" id="order-data">
            <!-- Populated by editor.js -->
          </div>
        </div>

        <div class="sidebar__section">
          <h3 class="sidebar__heading">Property</h3>
          <div class="sidebar__grid" id="property-data">
            <!-- Populated by editor.js -->
          </div>
        </div>

        <div class="sidebar__section">
          <h3 class="sidebar__heading">Images</h3>
          <div class="progress-section" id="progress-section">
            <div class="progress-bar">
              <div class="progress-bar__fill" id="progress-fill"></div>
            </div>
            <p class="progress-text" id="progress-text">Waiting…</p>
          </div>
          <div class="image-list" id="image-list">
            <!-- Populated by editor.js -->
          </div>
        </div>

      </div>
    </aside>

  </main>

  <!-- Editor Script (ES Module) -->
  <script type="module" src="js/editor.js"></script>

</body>
</html>
